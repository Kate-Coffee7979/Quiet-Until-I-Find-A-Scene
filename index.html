        .landing {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;

        .main-trigger { border: none; background: none; cursor: pointer; box-shadow: none; }
        .main-trigger svg { width: 55px; height: 55px; fill: var(--deep-charcoal); transition: 0.4s; opacity: 0.6; filter: none; }
        .main-trigger:hover svg { opacity: 1; transform: translateY(-5px); }

        /* Container */
        .container { max-width: 600px; margin: 0 auto; padding: 0 25px 30px 25px; display: none; }
        .container.visible { display: block; }

        .page-header { display: flex; padding: 12px 0; position: sticky; top: 0; background-color: var(--oak-bg); z-index: 60; }
        .back-btn { display: flex; align-items: center; opacity: 0.25; transition: 0.3s; border: none; background: none; cursor: pointer; }
        .back-btn svg { width: 18px; height: 9px; fill: var(--deep-charcoal); }

        /* Nav Icons */
        .category-nav { padding-bottom: 20px; display: flex; justify-content: center; gap: 40px; }
        .nav-icon-btn { opacity: 0.12; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s; border: none; background: none; cursor: pointer; }
        .nav-icon-btn svg { width: 42px; height: 42px; fill: var(--deep-charcoal); }
        .nav-icon-btn.active { opacity: 1; transform: scale(1.03); }
        .nav-icon-btn.active svg { fill: var(--olive-point); }
        .nav-label { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 700; letter-spacing: 1.5px; }

        /* Search */
        .search-wrapper { margin-bottom: 25px; }
        .search-input { width: 100%; border: none; border-bottom: 1px solid rgba(0, 0, 0, 0.08); background: transparent; padding: 6px 0; font-family: 'Lora', serif; font-size: 0.95rem; }

        /* Area & Shop Item - 밀착 레이아웃 */
        .area-section { margin-bottom: 35px; }
        .area-header { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.3rem; border-bottom: 1px solid var(--olive-point); padding-bottom: 3px; margin-bottom: 20px; color: var(--olive-point); text-transform: uppercase; letter-spacing: 1px; }

        .shop-item { margin-bottom: 35px; opacity: 0; transform: translateY(15px); transition: 0.5s ease-out; }
        .shop-item.visible { opacity: 1; transform: translateY(0); }
        
        .shop-meta { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.5px; color: var(--olive-point); margin-bottom: 2px; font-weight: 700; text-transform: uppercase; opacity: 0.7; }
        .shop-name { font-family: 'DM Serif Display', serif; font-size: 1.65rem; margin-bottom: 2px; line-height: 1; font-weight: 400; }
        
        .scene-point { font-family: 'Montserrat', sans-serif; font-size: 0.76rem; font-weight: 800; color: var(--olive-point); letter-spacing: -0.2px; margin: 8px 0 6px 0; line-height: 1.2; }

        .shop-desc { font-size: 0.88rem; opacity: 0.75; margin-bottom: 10px; border-left: 2px solid var(--latte-point); padding-left: 10px; font-style: italic; line-height: 1.4; color: #444; }

        .shop-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; font-size: 0.7rem; border-top: 1px solid rgba(0,0,0,0.03); padding-top: 8px; }
        .info-label { font-size: 0.5rem; font-weight: 700; opacity: 0.35; text-transform: uppercase; margin-bottom: 1px; display: block; }
        .info-value { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; color: #666; font-size: 0.7rem; }

        .signature-box { padding: 4px 0; border-top: 0.5px solid rgba(0, 0, 0, 0.05); border-bottom: 0.5px solid rgba(0, 0, 0, 0.05); margin-bottom: 8px; }

        .open-scene-btn { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; background: none; margin-top: 0; }
        .cup-render-box { position: relative; width: 30px; height: 25px; display: flex; align-items: center; justify-content: center; }
        .cup-svg-final { width: 26px; height: 26px; fill: none; stroke: var(--espresso-deep); stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }

        footer { text-align: center; padding: 50px 0; opacity: 0.15; font-size: 0.6rem; }
    </style>
</head>

            `;
        }
        function setFilter(filter) { currentFilter = filter; renderNav(); renderList(); }
        function handleSearch(query) { currentSearchQuery = query.toLowerCase(); renderList(); }

        function triggerScene(btn, url) {
            if(btn.classList.contains('active')) return;
            btn.classList.add('active');
            setTimeout(() => {
                const mapLink = document.createElement('a'); mapLink.href = url; mapLink.target = '_blank';
                document.body.appendChild(mapLink); mapLink.click(); document.body.removeChild(mapLink);
                setTimeout(() => { btn.classList.remove('active'); }, 400);
            }, 800);
        }

        function renderList() {
            const container = document.getElementById('shop-list');
            const isKo = currentFilter === 'korean';
            const filteredData = database.filter(shop => shop.name.toLowerCase().includes(currentSearchQuery));
            const grouped = filteredData.reduce((acc, shop) => { if (!acc[shop.area]) acc[shop.area] = []; acc[shop.area].push(shop); return acc; }, {});
            const sortedAreas = Object.keys(grouped).sort((a, b) => areaOrder.indexOf(a) - areaOrder.indexOf(b));

            container.innerHTML = sortedAreas.map(area => `
                <section class="area-section">
                    <h3 class="area-header">${area}</h3>
                    ${grouped[area].sort((a, b) => a.rank - b.rank).map(shop => {
                        const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + area + ' Melbourne')}`;
                        return `
                        <div class="shop-item">
                            <div class="shop-meta">${shop.addr}</div>
                            <h2 class="shop-name">${shop.name}</h2>
                            <div class="scene-point">${shop.hook_ko}</div>
                            <p class="shop-desc">${shop.desc_ko}</p>
                            <div class="shop-info-grid">
                                <div><span class="info-label">SCENE WEATHER</span><span class="info-value">${shop.weather_ko}</span></div>
                                <div><span class="info-label">SCENE VIBE</span><span class="info-value">${shop.vibe_ko}</span></div>
                            </div>
                            <div class="signature-box"><span class="signature-label">SIGNATURE</span><span class="signature-name">${shop.sig}</span></div>
                            <button class="open-scene-btn" onclick="triggerScene(this, '${googleMapsUrl}')">

                                        <path class="steam-line-v5" d="M12 25 Q14 18 10 15 T12 5" /><path class="steam-line-v5" d="M18 25 Q20 18 16 15 T18 5" /><path class="steam-line-v5" d="M24 25 Q26 18 22 15 T24 5" />
                                    </svg>
                                    <svg class="cup-svg-final"><use href="#icon-espresso-v5"></use></svg>
                                </div>
                                <span class="open-scene-text">Open Scene</span>
                            </button>
                        </div>`}).join('')}

            setTimeout(handleScroll, 100);
        }

        function handleScroll() { document.querySelectorAll('.shop-item').forEach(el => { if(el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible'); }); }
