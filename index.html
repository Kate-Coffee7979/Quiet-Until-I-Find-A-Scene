<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet, Until I Find a Scene.</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oak-bg: #fcf9f5; 
            --olive-point: #5e634e; 
            --latte-point: #a68d71;
            --espresso-deep: #4b3d30;
            --deep-charcoal: #2c2c2c; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; color: var(--deep-charcoal); }
        body { background-color: var(--oak-bg); font-family: 'Lora', serif; line-height: 1.5; word-break: keep-all; overflow-x: hidden; }
        
        /* Landing */
        .landing {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--oak-bg); transition: transform 0.9s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 1000; position: fixed; width: 100%; top: 0; left: 0;
        }
        .landing.hidden { transform: translateY(-100%); pointer-events: none; }
        .landing h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; font-style: italic; margin-bottom: 60px; letter-spacing: -0.2px; font-weight: 400; }
        .main-trigger { cursor: pointer; border: none; background: none; }
        .main-trigger svg { width: 60px; height: 60px; fill: var(--deep-charcoal); opacity: 0.6; transition: 0.5s; }

        /* Container */
        .container { max-width: 580px; margin: 0 auto; padding: 20px 25px; display: none; }
        .container.visible { display: block; }

        /* Nav */
        .page-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; position: sticky; top: 0; background-color: var(--oak-bg); z-index: 60; }
        .back-btn { border: none; background: none; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .back-btn svg { width: 25px; height: 12px; fill: var(--deep-charcoal); }

        .category-nav { display: flex; gap: 8px; }
        .nav-icon-btn { 
            opacity: 0.3; border: 1px solid var(--deep-charcoal); background: none; cursor: pointer;
            padding: 4px 10px; border-radius: 20px; transition: 0.4s;
        }
        .nav-icon-btn.active { opacity: 1; background: var(--olive-point); border-color: var(--olive-point); }
        .nav-icon-btn.active .nav-label { color: #fff; }
        .nav-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; font-weight: 700; letter-spacing: 1px; }

        .search-wrapper { margin: 20px 0 50px 0; }
        .search-input { 
            width: 100%; border: none; border-bottom: 1px solid rgba(0, 0, 0, 0.08); 
            background: transparent; padding: 12px 0; font-family: 'Lora', serif; font-size: 0.95rem; outline: none; font-style: italic;
        }

        .area-header { 
            font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.6rem; 
            margin-bottom: 60px; color: var(--olive-point); border-bottom: 2px solid var(--olive-point); padding-bottom: 8px;
        }

        .shop-item { margin-bottom: 90px; opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .shop-item.visible { opacity: 1; transform: translateY(0); }
        
        .shop-addr { 
            font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 700; color: var(--latte-point); 
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; line-height: 1.5;
        }
        
        .shop-name { 
            font-family: 'DM Serif Display', serif; font-size: 1.35rem; line-height: 1.2; font-weight: 400; 
            color: var(--deep-charcoal); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Action Group */
        .action-group { display: flex; align-items: center; gap: 12px; margin: 8px 0 20px 0; }
        .btn-text { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--olive-point); }
        
        .icon-btn { cursor: pointer; border: none; background: none; display: flex; align-items: center; transition: 0.3s; position: relative; }
        .icon-btn:hover { opacity: 0.5; }
        .btn-icon-svg { width: 18px; height: 18px; fill: none; stroke: var(--olive-point); stroke-width: 1.5; }

        /* Steam Animation (밀착 조정) */
        .steam-wrap { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); display: none; }
        .steam-line { stroke: var(--olive-point); stroke-width: 1.5; fill: none; opacity: 0; }
        .icon-btn.animating .steam-wrap { display: block; }
        .icon-btn.animating .steam-line { animation: steam-rise 0.95s forwards; }

        @keyframes steam-rise {
            0% { opacity: 0; transform: translateY(0); }
            40% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-8px); }
        }

        /* Weather Section (Purpose 대체) */
        .shop-weather-box { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-style: italic; font-weight: 500; color: var(--olive-point); letter-spacing: 0.2px; margin-bottom: 20px; opacity: 0.8; }

        .info-row { display: flex; gap: 15px; margin-bottom: 12px; align-items: flex-start; border-bottom: 1px solid rgba(0,0,0,0.03); padding-bottom: 8px; }
        .info-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; font-weight: 700; min-width: 75px; opacity: 0.3; text-transform: uppercase; letter-spacing: 1px; padding-top: 6px; }
        .info-content { font-size: 0.9rem; opacity: 0.9; line-height: 1.45; text-align: justify; font-family: 'Lora', serif; }

        footer { text-align: left; padding: 80px 25px; border-top: 1px solid rgba(0,0,0,0.03); opacity: 0.2; font-size: 0.7rem; letter-spacing: 2px; font-style: italic; }
    </style>
</head>

        <footer>End of scenes. An archive of Melbourne.</footer>
    </div>

            { area: 'Melbourne CBD', name: "in. btwn", addr: "Djeembana Walk", ig: "in.btwn_melbourne", weather_ko: "계절의 변화가 공기에 머물 때", roaster: "Specialty Selection", sig: "Seasonal Edition", rank: 30, desc_ko: "창밖 온도에 맞춰 설계된 원두의 풍미. 오직 지금 이 순간에만 마실 수 있는 계절의 조각." },

            { area: 'North Melbourne', name: "Path Melbourne", addr: "Villiers St / North Melbourne", ig: "path_melbourne", weather_ko: "안개 낀 고요한 새벽", roaster: "In-house Roasts", sig: "Single Origin Filter", rank: 1, desc_ko: "대화가 생략된 정중한 정적. 원두를 다루는 소리만이 공명하며 커피가 예술이 되는 과정." },
            { area: 'North Melbourne', name: "Rosso Coffee Experience", addr: "Dryburgh St / North Melbourne", ig: "rossocoffee", weather_ko: "취향을 실험하고 싶은 날", roaster: "Governor / Commuter / Bohemian Blends", sig: "Espresso Flight", rank: 2, desc_ko: "세 가지 블렌드(Governor, Commuter, Bohemian)가 당신의 오늘을 정의하는 커피 실험실." },
            { area: 'North Melbourne', name: "INI Studio", addr: "Queensberry St / North Melbourne", ig: "inistudio.melbourne", weather_ko: "디자인 영감이 필요한 오전", roaster: "Specialty Selection", sig: "Hand Drip Filter", rank: 3, desc_ko: "디자인 스튜디오의 절제된 미학. 가구의 선과 커피 잔의 곡선이 조화를 이루는 휴식." },
            { area: 'North Melbourne / Prahran', name: "Tone Coffee Roasters", addr: "Queensberry St / North Melbourne / Prahran", ig: "tone.coffee", weather_ko: "로컬의 활기를 느끼는 토요일", roaster: "Tone Roasters", sig: "Tiger Bomb Espresso", rank: 4, desc_ko: "로스팅 머신의 열기와 이웃들의 인사가 섞인 장면. 갓 볶은 원두 향기가 온 동네를 감싸는 무드." },

            // --- Other Areas ---
            { area: 'Fitzroy & Collingwood', name: "Proud Mary Coffee", addr: "Oxford St / Collingwood", ig: "proudmarycoffee", weather_ko: "에너지가 샘솟는 정오", roaster: "Proud Mary", sig: "V60 Filter Coffee", rank: 1, desc_ko: "붉은 벽돌과 오픈 키친의 소음이 활기차다. 바쁜 에너지 속 커피의 자부심이 느껴지는 장면." },
            { area: 'Fitzroy & Collingwood', name: "Aunty Peg’s", addr: "Wellington St / Collingwood", ig: "proudmarycoffee", weather_ko: "본질에만 몰두하고 싶을 때", roaster: "Proud Mary Rare", sig: "Black Tasting Flight", rank: 2, desc_ko: "예술 감상 같은 고요함 속에 나누는 원두 대화. 검은 액체의 깊은 미학." },
            { area: 'Fitzroy / Collingwood', name: "ACOFFEE", addr: "Russell St / Collingwood", ig: "acoffee_melbourne", weather_ko: "눈부시게 투명한 날", roaster: "ACOFFEE Roasters", sig: "Filter Coffee", rank: 3, desc_ko: "순백의 화이트 큐브 속에서 완성되는 여백의 미학. 필터 커피 한 잔으로 완전해지는 공간." },
            { area: 'South Melbourne & South Yarra', name: "ST. ALi Coffee Roasters", addr: "Yarra Pl / South Melbourne", ig: "st_ali", weather_ko: "자유로운 반항아 같은 아침", roaster: "ST. ALi", sig: "Orthodox White", rank: 1, desc_ko: "그래피티 가득한 골목, 창고 안에서 폭발하는 개척자들의 에너지. 멜버른 커피 혁명의 활기." },
            { area: 'South Melbourne & South Yarra', name: "Campos Coffee", addr: "South Yarra", ig: "camposcoffee", weather_ko: "품격 있는 일요일의 여유", roaster: "Campos Superior", sig: "Flat White", rank: 2, desc_ko: "잘 차려입은 로컬들 사이 초록색 로고의 일관된 완벽함. 언제나 신뢰할 수 있는 단단한 품질." },
            { area: 'Brunswick', name: "ONA Coffee", addr: "Ovens St / Brunswick", ig: "onacoffee", weather_ko: "커피의 한계를 시험하고 싶은 날", roaster: "ONA Specialty", sig: "Raspberry Candy", rank: 1, desc_ko: "우주 정거장 바에서 시작되는 새로운 미각 탐험. 냉동 원두가 선사하는 미래적인 한 잔." },
            { area: 'Brunswick', name: "Wide Open Road Coffee Roasters", addr: "Barkly St / Brunswick", ig: "wideopenroadcoffee", weather_ko: "자유가 필요한 오후", roaster: "Wide Open Road", sig: "Bathysphere Blend", rank: 2, desc_ko: "예술적 감각이 어우러져 당신의 생각을 확장시키는 공간. 브런즈윅의 거친 자유를 닮은 안식처." },
            { area: 'Brunswick', name: "Disciple Roasters", addr: "Black St / Brunswick", ig: "discipleroasters", weather_ko: "본질에만 집중하고 싶은 날", roaster: "Disciple Roasts", sig: "Single Origin Filter", rank: 3, desc_ko: "장식 없는 창고, 잠재력을 끌어올리는 장인의 손길이 남기는 여운. 원두 자체에만 집중하는 시간." },
            { area: 'Carlton', name: "Good Measure", addr: "Lygon St / Carlton", ig: "goodmeasure_melbourne", weather_ko: "낮과 밤의 경계가 모호해지는 시간", roaster: "Rotating Guest", sig: "Mont Blanc Coffee", rank: 1, desc_ko: "낮의 에스프레소가 밤의 칵테일로 변하는 바이닐 사운드 속의 낭만. 도심 로맨틱한 전환의 순간." },
            { area: 'Hawthorn', name: "MORE COFFEE MELBOURNE", addr: "Hawthorn", ig: "morecoffeemelbourne", weather_ko: "교외의 나른한 낮", roaster: "Selected Specialty", sig: "Signature Latte", rank: 1, desc_ko: "햇살 긴 창가, 부드러운 우유 거품 라떼와 함께하는 깊은 휴식. 소란스럽지 않은 동네 리듬의 평화." }
        ];

        const areaOrder = ['Melbourne CBD', 'North Melbourne', 'North Melbourne / Prahran', 'Carlton', 'Fitzroy & Collingwood', 'Fitzroy / Collingwood', 'South Melbourne & South Yarra', 'Brunswick', 'Hawthorn'];
        let currentFilter = 'korean';
        let currentSearchQuery = '';

        function openArchive() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-container').classList.add('visible');
            renderNav(); renderList();
        }

        function goBack() { 
            document.getElementById('landing').classList.remove('hidden'); 
            document.getElementById('main-container').classList.remove('visible');
        }

        function renderNav() {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = `
                <button class="nav-icon-btn ${currentFilter === 'korean' ? 'active' : ''}" onclick="setFilter('korean')"><span class="nav-label">KOR</span></button>
                <button class="nav-icon-btn ${currentFilter === 'local' ? 'active' : ''}" onclick="setFilter('local')"><span class="nav-label">MELB</span></button>
            `;
        }

        function setFilter(f) { currentFilter = f; renderNav(); renderList(); }
        function handleSearch(v) { currentSearchQuery = v.toLowerCase(); renderList(); }

        function triggerMap(btn, url) {
            if(btn.classList.contains('animating')) return;
            btn.classList.add('animating');
            setTimeout(() => {
                window.open(url, '_blank');
                setTimeout(() => btn.classList.remove('animating'), 300);
            }, 950);
        }

        function renderList() {
            const container = document.getElementById('shop-list');
            const isKo = currentFilter === 'korean';

            const filteredData = database.filter(s => s.name.toLowerCase().includes(currentSearchQuery) || s.addr.toLowerCase().includes(currentSearchQuery));
            const grouped = filteredData.reduce((acc, s) => { if(!acc[s.area]) acc[s.area]=[]; acc[s.area].push(s); return acc; }, {});
            
            const sortedAreas = Object.keys(grouped).sort((a,b) => {
                let idxA = areaOrder.indexOf(a); let idxB = areaOrder.indexOf(b);
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            });

            container.innerHTML = sortedAreas.map(area => `
                <div class="area-section">
                    <h3 class="area-header">${area}</h3>
                    ${grouped[area].sort((a,b)=>a.rank-b.rank).map(shop => {
                        const googleUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + area)}`;
                        const instaUrl = shop.ig.startsWith('http') ? shop.ig : `https://www.instagram.com/${shop.ig}`;
                        
                        // 주소 줄바꿈 (Code Black 맞춤 처리)
                        let formattedAddr = shop.addr;
                        if(shop.name.includes("Code Black")) {
                            formattedAddr = shop.addr.replace("South Melbourne", "<br>South Melbourne / North Melbourne");
                        } else {
                            formattedAddr = shop.addr.replace(/South Melbourne/g, '<br>South Melbourne').replace(/North Melbourne/g, '<br>North Melbourne');
                        }

                        return `
                        <div class="shop-item">
                            <div class="shop-addr">${formattedAddr}</div>
                            <h2 class="shop-name">${shop.name}</h2>
                            
                            <div class="action-group">
                                <span class="btn-text">Open Scene</span>
                                <button class="icon-btn" onclick="window.open('${instaUrl}', '_blank')" title="Instagram">
                                    <svg class="btn-icon-svg"><use href="#icon-insta"></use></svg>
                                </button>
                                <button class="icon-btn" onclick="triggerMap(this, '${googleUrl}')" title="Google Maps">
                                    <div class="steam-wrap">
                                        <svg width="20" height="20" viewBox="0 0 24 24">
                                            <path class="steam-line" d="M8 8 Q9 4 8 0" />
                                            <path class="steam-line" d="M12 8 Q13 4 12 0" />
                                            <path class="steam-line" d="M16 8 Q17 4 16 0" />
                                        </svg>
                                    </div>
                                    <svg class="btn-icon-svg"><use href="#icon-cup-small"></use></svg>
                                </button>
                            </div>

                            <div class="shop-weather-box">${shop.weather_ko}</div>
                            
                            <div class="info-row">
                                <span class="info-label">Roasters</span>
                                <div class="info-content">${shop.roaster}</div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Scene</span>
                                <div class="info-content">${shop.desc_ko}</div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Signature</span>
                                <div class="info-content">${shop.sig}</div>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `).join('');
            
            setTimeout(handleScroll, 100);
        }

        function handleScroll() {
            document.querySelectorAll('.shop-item').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
            });
        }
        window.addEventListener('scroll', handleScroll);
    </script>
</body>
</html>
