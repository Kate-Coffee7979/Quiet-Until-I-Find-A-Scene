<html lang="ko">
<head>

    <style>
        :root {
            --oak-bg: #fcf9f5; 
            --olive-point: #5e634e; 
            --latte-point: #a68d71;
            --espresso-deep: #4b3d30;
            --deep-charcoal: #2c2c2c; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; color: var(--deep-charcoal); }
        body { background-color: var(--oak-bg); font-family: 'Lora', serif; line-height: 1.5; word-break: keep-all; overflow-x: hidden; }
        
        /* Landing */
        .landing {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--oak-bg); transition: transform 0.9s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 1000; position: fixed; width: 100%; top: 0; left: 0;
        }
        .landing.hidden { transform: translateY(-100%); pointer-events: none; }
        .landing h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; font-style: italic; margin-bottom: 60px; letter-spacing: -0.2px; font-weight: 400; }
        .main-trigger { cursor: pointer; border: none; background: none; }
        .main-trigger svg { width: 60px; height: 60px; fill: var(--deep-charcoal); opacity: 0.6; transition: 0.5s; }
        .main-trigger:hover svg { transform: translateY(-8px); fill: var(--olive-point); }

        /* Container */
        .container { max-width: 580px; margin: 0 auto; padding: 20px 25px; display: none; }
        .container.visible { display: block; }

        /* Small Cute Nav */
        .page-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; position: sticky; top: 0; background-color: var(--oak-bg); z-index: 60; }
        .back-btn { border: none; background: none; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .back-btn:hover { opacity: 1; }
        .back-btn svg { width: 25px; height: 12px; fill: var(--deep-charcoal); }

        .category-nav { display: flex; gap: 8px; }
        .nav-icon-btn { 
            opacity: 0.3; border: 1px solid var(--deep-charcoal); background: none; cursor: pointer;
            padding: 4px 10px; border-radius: 20px; transition: 0.4s;
        }
        .nav-icon-btn.active { opacity: 1; background: var(--olive-point); border-color: var(--olive-point); }
        .nav-icon-btn.active .nav-label { color: #fff; }
        .nav-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; font-weight: 700; letter-spacing: 1px; color: var(--deep-charcoal); }

        .search-wrapper { margin: 20px 0 50px 0; }
        .search-input { 
            width: 100%; border: none; border-bottom: 1px solid rgba(0, 0, 0, 0.08); 
            background: transparent; padding: 12px 0; font-family: 'Lora', serif; 
            font-size: 0.95rem; outline: none; text-align: left; font-style: italic;
        }

        .area-section { margin-bottom: 120px; }
        .area-header { 
            font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.6rem; 
            margin-bottom: 60px; color: var(--olive-point); text-align: left; letter-spacing: -0.5px;
            border-bottom: 2px solid var(--olive-point); padding-bottom: 8px;
        }

        .shop-item { margin-bottom: 90px; opacity: 0; transform: translateY(30px); transition: 1s ease-out; text-align: left; }
        .shop-item.visible { opacity: 1; transform: translateY(0); }
        
        /* 1. 주소 (0.55rem, South Melbourne 등 단어 묶음 유지) */
        .shop-addr { 
            font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 700; color: var(--latte-point); 
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; display: block;
            white-space: normal; word-break: keep-all; line-height: 1.4;
        }
        .shop-name { font-family: 'DM Serif Display', serif; font-size: 1.5rem; line-height: 1.2; font-weight: 400; margin-bottom: 6px; color: var(--deep-charcoal); }
        .shop-purpose { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 600; color: var(--olive-point); letter-spacing: 0.5px; margin-bottom: 4px; }
        .shop-weather { font-size: 0.8rem; font-style: italic; opacity: 0.4; margin-bottom: 25px; }

        /* 2줄 특징 섹션 (양쪽 정렬) */
        .info-row { display: flex; gap: 15px; margin-bottom: 12px; align-items: flex-start; border-bottom: 1px solid rgba(0,0,0,0.03); padding-bottom: 8px; }
        .info-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; font-weight: 700; min-width: 60px; opacity: 0.3; text-transform: uppercase; letter-spacing: 1px; padding-top: 6px; }
        .info-content { 
            font-size: 0.95rem; opacity: 0.9; line-height: 1.45; width: 100%; 
            white-space: normal; text-align: justify; font-family: 'Lora', serif;
        }

        /* Olive Cup Button */
        .open-scene-btn { 
            display: inline-flex; align-items: center; gap: 10px; margin-top: 15px;
            cursor: pointer; border: none; background: none; transition: 0.3s; padding: 5px 0;
        }
        .open-scene-btn:hover { opacity: 0.6; }
        .cup-box { position: relative; width: 35px; height: 35px; }
        .cup-svg { width: 32px; height: 32px; fill: none; stroke: var(--olive-point); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .btn-text { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--olive-point); }

        /* Steam Animation */
        .steam-line { stroke: var(--olive-point); stroke-width: 1.8; stroke-linecap: round; opacity: 0; fill: none; }
        .open-scene-btn.animating .steam-line { animation: steam-rise 1s forwards; }
        .open-scene-btn:hover .steam-line { animation: steam-rise 1.2s infinite; }
        .steam-line:nth-child(2) { animation-delay: 0.1s; }
        .steam-line:nth-child(3) { animation-delay: 0.2s; }

        @keyframes steam-rise {
            0% { opacity: 0; transform: translateY(0); }
            40% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-12px); }
        }

        footer { text-align: left; padding: 80px 25px; border-top: 1px solid rgba(0,0,0,0.03); opacity: 0.2; font-size: 0.7rem; letter-spacing: 2px; font-style: italic; }
    </style>
</head>

        let currentFilter = 'korean';

        function openArchive() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-container').classList.add('visible');
            renderNav(); renderList();
        }

        function goBack() { 
            document.getElementById('landing').classList.remove('hidden'); 
            document.getElementById('main-container').classList.remove('visible');
        }

        function renderNav() {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = `
                <button class="nav-icon-btn ${currentFilter === 'korean' ? 'active' : ''}" onclick="setFilter('korean')"><span class="nav-label">KOR</span></button>
                <button class="nav-icon-btn ${currentFilter === 'local' ? 'active' : ''}" onclick="setFilter('local')"><span class="nav-label">MELB</span></button>
            `;
        }

        function setFilter(f) { currentFilter = f; renderNav(); renderList(); }
        function handleSearch(v) { currentSearchQuery = v.toLowerCase(); renderList(); }

        function triggerScene(btn, url) {
            if(btn.classList.contains('animating')) return;
            btn.classList.add('animating');
            setTimeout(() => {
                window.open(url, '_blank');
                setTimeout(() => { btn.classList.remove('animating'); }, 500);
            }, 950);
        }

        function renderList() {
            const container = document.getElementById('shop-list');
            const isKo = currentFilter === 'korean';

            const filteredData = database.filter(s => s.name.toLowerCase().includes(currentSearchQuery) || s.addr.toLowerCase().includes(currentSearchQuery));
            const grouped = filteredData.reduce((acc, s) => { if(!acc[s.area]) acc[s.area]=[]; acc[s.area].push(s); return acc; }, {});
            
            const sortedAreas = Object.keys(grouped).sort((a,b) => {
                let idxA = areaOrder.indexOf(a);
                let idxB = areaOrder.indexOf(b);
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            });

            container.innerHTML = sortedAreas.map(area => `
                <div class="area-section">
                    <h3 class="area-header">${area}</h3>

                            <div class="shop-weather">${isKo ? shop.weather_ko : shop.weather_en}</div>
                            
                            <div class="info-row">
                                <span class="info-label">Beans</span>
                                <div class="info-content">${shop.beans}</div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Scene</span>
                                <div class="info-content">${isKo ? shop.desc_ko : shop.desc_en}</div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Signature</span>
                                <div class="info-content">${shop.sig}</div>
                            </div>

                            <button class="open-scene-btn" onclick="triggerScene(this, '${googleUrl}')">
                                <div class="cup-box">
                                    <svg class="cup-svg" viewBox="0 0 50 50">
                                        <g transform="translate(0, 5)">
                                            <path class="steam-line" d="M18 5 Q20 0 18 -5" />
                                            <path class="steam-line" d="M25 5 Q27 0 25 -5" />
                                            <path class="steam-line" d="M32 5 Q34 0 32 -5" />
                                        </g>
                                        <path d="M13 41h24" />
                                        <path d="M16 18h18v10c0 5.5-4.5 10-10 10s-10-4.5-10-10v-10z" />
                                        <path d="M34 21c3.5 0 6 2.5 6 5s-2.5 5-6 5" />
                                    </svg>
                                </div>
                                <span class="btn-text">Open Scene</span>
                            </button>
                        </div>
                    `}).join('')}
                </div>
            `).join('');
            
            setTimeout(handleScroll, 100);
        }

        function handleScroll() {
            document.querySelectorAll('.shop-item').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
            });
        }
        window.addEventListener('scroll', handleScroll);
    </script>
</body>
</html>
