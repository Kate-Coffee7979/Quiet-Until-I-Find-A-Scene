<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --oak-bg: #fcf9f5; 
            --olive-point: #5e634e; 
            --latte-point: #a68d71;
            --espresso-deep: #4b3d30; /* 더 진한 커피색 추가 */
            --deep-charcoal: #2c2c2c; 
            --soft-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; color: var(--deep-charcoal); }
        body { background-color: var(--oak-bg); font-family: 'Lora', serif; line-height: 1.7; word-break: keep-all; overflow-x: hidden; }
        
        /* Landing */
        .landing {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--oak-bg); transition: transform 0.9s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 1000; position: fixed; width: 100%; top: 0; left: 0;
        }
        .landing.hidden { transform: translateY(-100%); pointer-events: none; }
        .landing h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; font-style: italic; margin-bottom: 60px; letter-spacing: -0.5px; font-weight: 400; }
        
        .main-trigger { display: flex; flex-direction: column; align-items: center; cursor: pointer; border: none; background: none; }
        .main-trigger svg { width: 70px; height: 70px; fill: var(--deep-charcoal); transition: 0.5s; opacity: 0.7; }
        .main-trigger:hover svg { transform: translateY(-10px); fill: var(--olive-point); opacity: 1; }

        /* Container */
        .container { max-width: 680px; margin: 0 auto; padding: 40px 25px; display: none; }
        .container.visible { display: block; }

        .page-header { display: flex; padding: 30px 0; position: sticky; top: 0; background-color: var(--oak-bg); z-index: 60; }
        .back-btn { display: flex; align-items: center; gap: 15px; opacity: 0.5; transition: 0.4s; border: none; background: none; cursor: pointer; }
        .back-btn svg { width: 30px; height: 15px; fill: var(--deep-charcoal); }

        /* Navigation Icons */
        .category-nav { padding: 10px 0 35px 0; display: flex; justify-content: center; gap: 50px; }
        .nav-icon-btn { opacity: 0.15; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.4s; border: none; background: none; cursor: pointer; }
        .nav-icon-btn.kor-btn svg { width: 40px; height: 32px; }
        .nav-icon-btn.mel-btn svg { width: 40px; height: 32px; }
        .nav-icon-btn.active { opacity: 1; transform: scale(1.1); }
        .nav-icon-btn.active .nav-label { color: var(--olive-point); font-weight: 700; }
        .nav-label { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 700; letter-spacing: 1.5px; }

        /* Search */
        .search-wrapper { margin-bottom: 50px; position: relative; }
        .search-input { 
            width: 100%; border: none; border-bottom: 1.5px solid rgba(0, 0, 0, 0.05); 
            background: transparent; padding: 12px 0; font-family: 'Lora', serif; 
            font-size: 1.05rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-bottom: 1.5px solid var(--olive-point); }
        .search-input::placeholder { opacity: 0.3; font-style: italic; }

        /* Area Head */
        .area-section { margin-bottom: 120px; }
        .area-header { 
            font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.8rem; 
            border-bottom: 1.5px solid var(--olive-point); padding-bottom: 10px; margin-bottom: 60px; 
            color: var(--olive-point); text-transform: uppercase; letter-spacing: 1px; 
        }

        .shop-item { margin-bottom: 110px; opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .shop-item.visible { opacity: 1; transform: translateY(0); }
        
        .shop-meta { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 1px; color: var(--olive-point); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        .shop-name { font-family: 'DM Serif Display', serif; font-size: 2.2rem; margin-bottom: 22px; line-height: 1.1; font-weight: 400; }
        
        .shop-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; font-size: 0.85rem; }
        .info-label { font-size: 0.6rem; font-weight: 700; opacity: 0.4; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        .shop-desc { font-size: 0.95rem; opacity: 0.85; margin-bottom: 25px; border-left: 2px solid var(--latte-point); padding-left: 15px; font-style: italic; line-height: 1.8; }

        .signature-box { padding: 12px 0; border-top: 0.5px solid rgba(0, 0, 0, 0.05); border-bottom: 0.5px solid rgba(0, 0, 0, 0.05); margin-bottom: 30px; }
        .signature-label { font-size: 0.5rem; font-weight: 700; color: var(--olive-point); font-family: 'Montserrat'; letter-spacing: 2px; text-transform: uppercase; margin-right: 10px; }
        .signature-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; color: #333; }

        /* Open Scene Button - 진한 에스프레소 컬러 */
        .open-scene-btn { 
            display: inline-flex; align-items: center; gap: 15px; 
            cursor: pointer; border: none; background: none; padding: 0;
            transition: 0.3s;
        }
        .open-scene-btn:hover { opacity: 0.7; }

        .cup-render-box { position: relative; width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; }
        /* 컵 색상을 진한 에스프레소 컬러로 변경 */
        .cup-svg-final { width: 50px; height: 50px; fill: none; stroke: var(--espresso-deep); stroke-width: 3.8; stroke-linecap: round; stroke-linejoin: round; }
        
        /* Steam Animation */
        .steam-line-v5 {
            fill: none; stroke: var(--espresso-deep); stroke-width: 3; stroke-linecap: round;
            opacity: 0; stroke-dasharray: 25; stroke-dashoffset: 25;
        }

        .open-scene-btn.active .steam-line-v5 {
            animation: steam-rise-v5 1.1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .open-scene-btn.active .steam-line-v5:nth-child(1) { animation-delay: 0s; }
        .open-scene-btn.active .steam-line-v5:nth-child(2) { animation-delay: 0.1s; }
        .open-scene-btn.active .steam-line-v5:nth-child(3) { animation-delay: 0.2s; }

        @keyframes steam-rise-v5 {
            0% { opacity: 0; stroke-dashoffset: 25; transform: translateY(0); }
            30% { opacity: 0.8; }
            100% { opacity: 0; stroke-dashoffset: 0; transform: translateY(-25px); }
        }

        .open-scene-text { 
            font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 700; 
            letter-spacing: 2px; color: var(--espresso-deep); text-transform: uppercase;
        }

        footer { text-align: center; padding: 100px 0; border-top: 1px solid rgba(0,0,0,0.03); }
        .end-text { font-family: 'DM Serif Display', serif; font-size: 1.4rem; font-style: italic; opacity: 0.5; margin-bottom: 10px; }
        .archive-note { font-family: 'Lora', serif; font-size: 0.8rem; font-style: italic; opacity: 0.4; }
    </style>
</head>

        let currentFilter = 'korean'; 
        let currentSearchQuery = '';

        function openArchive() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-container').classList.add('visible');
            renderNav();
            renderList();
            window.scrollTo(0, 0);
        }

        function goBack() { 
            document.getElementById('landing').classList.remove('hidden'); 
            document.getElementById('main-container').classList.remove('visible');
        }

        function renderNav() {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = `
                <button class="nav-icon-btn kor-btn ${currentFilter === 'korean' ? 'active' : ''}" onclick="setFilter('korean')">
                    <svg><use href="#filter-kor"></use></svg>
                    <span class="nav-label">KOR</span>
                </button>
                <button class="nav-icon-btn mel-btn ${currentFilter === 'local' ? 'active' : ''}" onclick="setFilter('local')">
                    <svg><use href="#filter-mel"></use></svg>
                    <span class="nav-label">MELB</span>
                </button>
            `;
        }

        function setFilter(filter) { currentFilter = filter; renderNav(); renderList(); }
        function handleSearch(query) { currentSearchQuery = query.toLowerCase(); renderList(); }

        /**
         * 애니메이션 후 구글 지도로 새 창 이동 (브라우저 차단 우회 보장)
         */
        function triggerScene(btn, url) {
            if(btn.classList.contains('active')) return;
            btn.classList.add('active');
            
            // 0.8초간 연기가 피어오르는 연출을 보여준 후 이동
            setTimeout(() => {
                const mapLink = document.createElement('a');
                mapLink.href = url;
                mapLink.target = '_blank';
                mapLink.rel = 'noopener noreferrer';
                
                document.body.appendChild(mapLink);
                mapLink.click();
                document.body.removeChild(mapLink);
                
                // 이동 후 딜레이 뒤에 상태 초기화
                setTimeout(() => {
                    btn.classList.remove('active');
                }, 400);
            }, 800);
        }

        function renderList() {
            const container = document.getElementById('shop-list');
            const isKo = currentFilter === 'korean';

            const filteredData = database.filter(shop => {
                return shop.name.toLowerCase().includes(currentSearchQuery) || 
                       shop.addr.toLowerCase().includes(currentSearchQuery) ||
                       shop.sig.toLowerCase().includes(currentSearchQuery);
            });

            const grouped = filteredData.reduce((acc, shop) => {
                if (!acc[shop.area]) acc[shop.area] = [];
                acc[shop.area].push(shop);
                return acc;
            }, {});

            const sortedAreas = Object.keys(grouped).sort((a, b) => areaOrder.indexOf(a) - areaOrder.indexOf(b));

            if(sortedAreas.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding: 100px 0; opacity: 0.3; font-style: italic;">No scene found.</p>`;
                return;
            }

            container.innerHTML = sortedAreas.map(area => `
                <section class="area-section">
                    <h3 class="area-header">${area}</h3>
                    ${grouped[area].sort((a, b) => a.rank - b.rank).map(shop => {
                        const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + area + ' Melbourne')}`;
                        return `
                        <div class="shop-item">
                            <div class="shop-meta">${shop.addr}</div>
                            <h2 class="shop-name">${shop.name}</h2>
                            <div class="shop-info-grid">
                                <div><span class="info-label">${isKo ? '장면의 날씨' : 'SCENE WEATHER'}</span>${isKo ? shop.weather_ko : shop.weather_en}</div>
                                <div><span class="info-label">${isKo ? '공간의 공기' : 'SCENE ATMOSPHERE'}</span>${isKo ? shop.vibe_ko : shop.vibe_en}</div>
                                <div><span class="info-label">${isKo ? '사용 원두' : 'BEANS'}</span>${shop.beans}</div>
                                <div><span class="info-label">${isKo ? '이 장면을 찾는 이유' : 'PURPOSE'}</span>${isKo ? shop.purpose_ko : shop.purpose_en}</div>
                            </div>
                            <p class="shop-desc">${isKo ? shop.desc_ko : shop.desc_en}</p>
                            <div class="signature-box"><span class="signature-label">SIGNATURE</span><span class="signature-name">${shop.sig}</span></div>
                            
                            <button class="open-scene-btn" onclick="triggerScene(this, '${googleMapsUrl}')">
                                <div class="cup-render-box">
                                    <!-- 부드러운 3줄 곡선 연기 -->
                                    <svg viewBox="0 0 50 50" style="position:absolute; top:-28px; left:0; width:60px; height:50px; pointer-events:none;">
                                        <path class="steam-line-v5" d="M18 35 Q20 25 16 20 T18 5" />
                                        <path class="steam-line-v5" d="M25 35 Q28 22 23 18 T25 0" />
                                        <path class="steam-line-v5" d="M32 35 Q34 25 30 20 T32 5" />
                                    </svg>
                                    <!-- 진한 에스프레소 컬러의 컵 아이콘 -->
                                    <svg class="cup-svg-final"><use href="#icon-espresso-v5"></use></svg>
                                </div>
                                <span class="open-scene-text">Open Scene</span>
                            </button>
                        </div>
                    `}).join('')}
                </section>
            `).join('');

            setTimeout(handleScroll, 100);
        }

        function handleScroll() {
            document.querySelectorAll('.shop-item').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
            });
        }
        window.addEventListener('scroll', handleScroll);
    </script>
